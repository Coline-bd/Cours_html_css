<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <form action="#" method="post">
        <h1>Connexion</h1>
        <div >
            <label class="margelabel" for="pseudo">Pseudo:</label>
            <input type="text" placeholder="Mon pseudo" id="pseudo" name="pseudo">
        </div>
        <div>
            <label class="margelabel" for="password">Mot de passe:</label>
            <input type="password" placeholder="Mon mot de passe" id="password" name="password">
        </div>
        <div>
            <input type="checkbox" name="souvenir" id="souvenir" checked>
            <label for="souvenir">Se souvenir de moi</label>
        </div>
        <div id="bouton">
            <button type="submit" value="connexion">Connexion</button>
            <button type="submit" value="retour">Retour</button>
        </div>
    </form>
    
</body>
</html>
